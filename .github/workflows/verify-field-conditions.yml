name: Verify nested field conditions

on:
  push:
    branches: [agent/security-hardening]

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/security-hardening
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install, lint, build and test
        id: verify
        shell: bash
        run: |
          set +e
          {
            npm ci &&
            npm run lint &&
            npm test
          } 2>&1 | tee /tmp/field-condition-ci.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            tail -n 300 /tmp/field-condition-ci.log > .github/field-condition-ci-failure.txt
            exit 0
          fi

      - name: Record verification result
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/verify-field-conditions.yml
          if [ "${{ steps.verify.outputs.status }}" = "0" ]; then
            rm -f .github/field-condition-ci-failure.txt
            git add -A
            git commit -m "Verify nested field conditions (CI success)"
          else
            git add .github/field-condition-ci-failure.txt
            git commit -m "Record nested field condition CI failure"
          fi
          git push origin HEAD:agent/security-hardening
