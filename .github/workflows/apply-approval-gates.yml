name: Apply approval gates

on:
  push:
    branches: [agent/security-hardening]

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/security-hardening
          show-progress: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Apply approval gate patch
        run: python scripts/apply-approval-gates-patch.py

      - name: Verify implementation
        id: verify
        shell: bash
        run: |
          set +e
          {
            npm ci &&
            npm run lint &&
            npm test
          } 2>&1 | tee /tmp/approval-gates-ci.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit result
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "${{ steps.verify.outputs.status }}" = "0" ]; then
            rm -f scripts/apply-approval-gates-patch.py
            rm -f .github/workflows/apply-approval-gates.yml
            rm -f .github/approval-gates-ci-failure.txt
            git add -A
            git commit -m "Add independent approval gates for dangerous XYOps processes"
          else
            git reset --hard HEAD
            tail -n 600 /tmp/approval-gates-ci.log > .github/approval-gates-ci-failure.txt
            git add .github/approval-gates-ci-failure.txt
            git commit -m "Record approval gate CI failure"
          fi
          git push origin HEAD:agent/security-hardening
