name: Temporary branch patch

on:
  push:
    branches: [agent/security-hardening]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/security-hardening
          show-progress: false

      - name: Patch legacy XYOps test identity
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          path = Path("tests/xyops-catalog-api.test.mjs")
          text = path.read_text()
          helper = '''
          function operatorEnv(values = {}) {
            return {
              PORTAL_IDENTITY_MODE: "static",
              PORTAL_STATIC_IDENTITY: "operator@example.test",
              PORTAL_DEFAULT_ROLE: "viewer",
              PORTAL_RBAC_JSON: JSON.stringify({ "operator@example.test": "operator" }),
              ...values,
            };
          }
          '''
          marker = 'import worker from "../dist/server/index.js";\n'
          if "function operatorEnv(values = {})" not in text:
              text = text.replace(marker, marker + helper, 1)
          text = text.replace(
              'const env = { XYOPS_URL: "https://xyops.example.test", XYOPS_API_KEY: "api-secret" };',
              'const env = operatorEnv({ XYOPS_URL: "https://xyops.example.test", XYOPS_API_KEY: "api-secret" });',
              1,
          )
          text = text.replace(
              'const env = { XYOPS_URL: "http://xyops.example.test", XYOPS_API_KEY: "api-secret" };',
              'const env = operatorEnv({ XYOPS_URL: "http://xyops.example.test", XYOPS_API_KEY: "api-secret" });',
              1,
          )
          path.write_text(text)
          PY

      - name: Commit patch
        shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/xyops-catalog-api.test.mjs
          git commit -m "Authenticate XYOps catalog tests"
          git push origin HEAD:agent/security-hardening
