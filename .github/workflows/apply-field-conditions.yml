name: Apply nested field conditions

on:
  push:
    branches: [agent/security-hardening]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/security-hardening
          show-progress: false

      - name: Apply runtime patch
        run: python scripts/apply-field-condition-patch.py

      - name: Remove temporary workflow
        run: rm -f .github/workflows/apply-field-conditions.yml

      - name: Commit and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Connect nested field conditions to portal runtime"
          git push origin HEAD:agent/security-hardening
