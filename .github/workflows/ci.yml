name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test RBAC
        run: node --test tests/rbac.test.mjs

      - name: Test FreeIPA API
        run: node --test tests/freeipa-api.test.mjs

      - name: Test operation journal
        run: node --test tests/operation-runs.test.mjs

      - name: Test persistent settings
        run: node --test tests/persistent-settings.test.mjs

      - name: Test remaining suite
        run: |
          files=$(find tests -maxdepth 1 -name '*.test.mjs' \
            ! -name 'rbac.test.mjs' \
            ! -name 'freeipa-api.test.mjs' \
            ! -name 'operation-runs.test.mjs' \
            ! -name 'persistent-settings.test.mjs' -print)
          if [ -n "$files" ]; then node --test $files; fi
