services:
  dashboard:
    build:
      context: .
    image: freeipa-admin-dashboard:local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - dashboard-data:/app/.wrangler
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  dashboard-data:
