name: Temporary catalog sync patch

on:
  push:
    branches: [agent/security-hardening]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/security-hardening
          show-progress: false

      - name: Implement scheduled catalog sync
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          worker_path = Path("worker/index.ts")
          text = worker_path.read_text()

          def replace_once(old: str, new: str):
              global text
              if old not in text:
                  raise SystemExit(f"worker anchor not found: {old[:80]!r}")
              text = text.replace(old, new, 1)

          replace_once(
              '  PORTAL_RBAC_JSON?: string;\n',
              '  PORTAL_RBAC_JSON?: string;\n  XYOPS_CATALOG_SYNC_ENABLED?: string;\n  XYOPS_CATALOG_SYNC_LOCK_TTL_SECONDS?: string;\n',
          )

          replace_once(
              'interface ExecutionContext {\n  waitUntil(promise: Promise<unknown>): void;\n  passThroughOnException(): void;\n}\n',
              'interface ExecutionContext {\n  waitUntil(promise: Promise<unknown>): void;\n  passThroughOnException(): void;\n}\n\ninterface ScheduledController {\n  cron?: string;\n  scheduledTime?: number;\n}\n',
          )

          replace_once(
              'type CatalogHistoryEntry = { id: string; syncedAt: number; changes: CatalogChange[]; processCount: number };\n',
              'type CatalogHistoryEntry = { id: string; syncedAt: number; changes: CatalogChange[]; processCount: number };\ntype CatalogSyncStatus = "running" | "success" | "failed" | "skipped";\ntype CatalogSyncRun = { id: string; trigger: string; status: CatalogSyncStatus; startedAt: number; completedAt: number | null; processCount: number; changeCount: number; error: string };\n',
          )

          replace_once(
              '    return handler.fetch(request, env, ctx);\n  },\n};\n',
              '    return handler.fetch(request, env, ctx);\n  },\n\n  async scheduled(controller: ScheduledController, env: Env | undefined, ctx: ExecutionContext): Promise<void> {\n    const runtimeEnv = env ?? (process.env as unknown as Env);\n    if (!catalogSyncEnabled(runtimeEnv.XYOPS_CATALOG_SYNC_ENABLED)) return;\n    const cron = String(controller.cron ?? "scheduled").slice(0, 120);\n    ctx.waitUntil(runCatalogSynchronization(runtimeEnv, `cron:${cron}`));\n  },\n};\n',
          )

          replace_once(
              'const createCatalogHistoryTable = `CREATE TABLE IF NOT EXISTS xyops_catalog_history (\n  id TEXT PRIMARY KEY NOT NULL,\n  synced_at INTEGER NOT NULL,\n  changes_json TEXT NOT NULL,\n  catalog_json TEXT NOT NULL\n)`;\n',
              '''const createCatalogHistoryTable = `CREATE TABLE IF NOT EXISTS xyops_catalog_history (\n  id TEXT PRIMARY KEY NOT NULL,\n  synced_at INTEGER NOT NULL,\n  changes_json TEXT NOT NULL,\n  catalog_json TEXT NOT NULL\n)`;\nconst createCatalogSyncLockTable = `CREATE TABLE IF NOT EXISTS xyops_catalog_sync_lock (\n  id TEXT PRIMARY KEY NOT NULL,\n  acquired_at INTEGER NOT NULL\n)`;\nconst createCatalogSyncRunsTable = `CREATE TABLE IF NOT EXISTS xyops_catalog_sync_runs (\n  id TEXT PRIMARY KEY NOT NULL,\n  trigger_name TEXT NOT NULL,\n  status TEXT NOT NULL,\n  started_at INTEGER NOT NULL,\n  completed_at INTEGER,\n  process_count INTEGER NOT NULL DEFAULT 0,\n  change_count INTEGER NOT NULL DEFAULT 0,\n  error TEXT\n)`;\n''',
          )

          sync_helpers = r'''
async function ensureCatalogSyncTables(env: Env): Promise<void> {
  if (!env.DB) return;
  await env.DB.prepare(createCatalogSyncLockTable).run();
  await env.DB.prepare(createCatalogSyncRunsTable).run();
  await env.DB.prepare("CREATE INDEX IF NOT EXISTS xyops_catalog_sync_runs_started_at_idx ON xyops_catalog_sync_runs(started_at DESC)").run();
}

function catalogSyncEnabled(value: unknown): boolean {
  const normalized = String(firstValue(value) ?? "").trim().toLowerCase();
  return !["false", "0", "no", "off", "disabled"].includes(normalized);
}

function catalogSyncLockTtlMs(env: Env): number {
  const seconds = Number(env.XYOPS_CATALOG_SYNC_LOCK_TTL_SECONDS ?? 900);
  return Math.max(60, Math.min(Number.isFinite(seconds) ? seconds : 900, 3600)) * 1000;
}

function catalogSyncError(error: unknown): string {
  return (error instanceof Error ? error.message : "XYOps catalog synchronization failed")
    .replace(/[\u0000-\u001f\u007f]/g, " ").slice(0, 500);
}

async function acquireCatalogSyncLock(env: Env, acquiredAt: number): Promise<boolean> {
  if (!env.DB) return false;
  await ensureCatalogSyncTables(env);
  await env.DB.prepare("DELETE FROM xyops_catalog_sync_lock WHERE id = ? AND acquired_at < ?")
    .bind("catalog", acquiredAt - catalogSyncLockTtlMs(env)).run();
  const result = await env.DB.prepare("INSERT OR IGNORE INTO xyops_catalog_sync_lock (id, acquired_at) VALUES (?, ?)")
    .bind("catalog", acquiredAt).run() as unknown as { meta?: { changes?: number }; changes?: number };
  const changes = Number(result.meta?.changes ?? result.changes ?? 0);
  if (changes > 0) return true;
  const row = await env.DB.prepare("SELECT acquired_at FROM xyops_catalog_sync_lock WHERE id = ?")
    .bind("catalog").first<{ acquired_at: number }>();
  return Number(row?.acquired_at ?? 0) === acquiredAt;
}

async function releaseCatalogSyncLock(env: Env, acquiredAt: number): Promise<void> {
  if (!env.DB) return;
  await env.DB.prepare("DELETE FROM xyops_catalog_sync_lock WHERE id = ? AND acquired_at = ?")
    .bind("catalog", acquiredAt).run();
}

async function saveCatalogSyncRun(env: Env, run: CatalogSyncRun): Promise<void> {
  if (!env.DB) return;
  await ensureCatalogSyncTables(env);
  await env.DB.prepare("INSERT INTO xyops_catalog_sync_runs (id, trigger_name, status, started_at, completed_at, process_count, change_count, error) VALUES (?, ?, ?, ?, ?, ?, ?, ?) ON CONFLICT(id) DO UPDATE SET status = excluded.status, completed_at = excluded.completed_at, process_count = excluded.process_count, change_count = excluded.change_count, error = excluded.error")
    .bind(run.id, run.trigger, run.status, run.startedAt, run.completedAt, run.processCount, run.changeCount, run.error || null).run();
  await env.DB.prepare("DELETE FROM xyops_catalog_sync_runs WHERE id NOT IN (SELECT id FROM xyops_catalog_sync_runs ORDER BY started_at DESC LIMIT 50)").run();
}

async function listCatalogSyncRuns(env: Env, limit = 20): Promise<CatalogSyncRun[]> {
  if (!env.DB) return [];
  await ensureCatalogSyncTables(env);
  const result = await env.DB.prepare("SELECT id, trigger_name, status, started_at, completed_at, process_count, change_count, error FROM xyops_catalog_sync_runs ORDER BY started_at DESC LIMIT ?")
    .bind(Math.max(1, Math.min(limit, 50))).all<Record<string, unknown>>();
  return (result.results ?? []).map((row) => ({
    id: String(row.id ?? ""), trigger: String(row.trigger_name ?? "scheduled"),
    status: ["running", "success", "failed", "skipped"].includes(String(row.status)) ? String(row.status) as CatalogSyncStatus : "failed",
    startedAt: Number(row.started_at ?? 0), completedAt: row.completed_at == null ? null : Number(row.completed_at),
    processCount: Number(row.process_count ?? 0), changeCount: Number(row.change_count ?? 0), error: String(row.error ?? ""),
  })).filter((run) => run.id);
}

async function runCatalogSynchronization(baseEnv: Env, trigger: string): Promise<CatalogSyncRun> {
  const startedAt = Date.now();
  const run: CatalogSyncRun = { id: crypto.randomUUID(), trigger: trigger.slice(0, 160), status: "running", startedAt, completedAt: null, processCount: 0, changeCount: 0, error: "" };
  if (!baseEnv.DB) return { ...run, status: "skipped", completedAt: Date.now(), error: "Persistent database is unavailable" };
  const acquired = await acquireCatalogSyncLock(baseEnv, startedAt);
  if (!acquired) {
    const skipped = { ...run, status: "skipped" as const, completedAt: Date.now(), error: "Синхронизация каталога уже выполняется" };
    await saveCatalogSyncRun(baseEnv, skipped);
    return skipped;
  }
  await saveCatalogSyncRun(baseEnv, run);
  try {
    const env = await effectiveEnv(baseEnv);
    if (boolValue(env.DEMO_MODE)) {
      run.status = "skipped";
      run.error = "Плановая синхронизация отключена в демо-режиме";
    } else {
      const xyopsUrl = cleanBaseUrl(env.XYOPS_URL);
      if (!xyopsUrl || !env.XYOPS_API_KEY) {
        run.status = "skipped";
        run.error = "XYOps is not configured";
      } else {
        const previous = await readCatalogSnapshot(baseEnv).catch(() => null);
        const live = await loadCatalog(env, xyopsUrl);
        const events = [...live.events].sort((left, right) => `${left.category}\0${left.title}\0${left.id}`.localeCompare(`${right.category}\0${right.title}\0${right.id}`));
        const changes = previous ? catalogChanges(previous.events, events) : events.map((event) => ({ id: event.id, title: event.title, kind: "new" as const }));
        const syncedAt = Date.now();
        await saveCatalogSnapshot(baseEnv, events, syncedAt);
        await saveCatalogHistory(baseEnv, events, changes, syncedAt);
        run.status = "success";
        run.processCount = events.length;
        run.changeCount = changes.length;
      }
    }
  } catch (error) {
    run.status = "failed";
    run.error = catalogSyncError(error);
  } finally {
    run.completedAt = Date.now();
    await releaseCatalogSyncLock(baseEnv, startedAt);
    await saveCatalogSyncRun(baseEnv, run);
  }
  return run;
}
'''

          replace_once(
              'function catalogChanges(previous: CatalogEvent[], current: CatalogEvent[]): CatalogChange[] {\n',
              sync_helpers + '\nfunction catalogChanges(previous: CatalogEvent[], current: CatalogEvent[]): CatalogChange[] {\n',
          )

          api_block = r'''
  if (url.pathname === "/api/integrations/catalog/sync") {
    const denied = requirePortalPermission(request, baseEnv, "settings.manage");
    if (denied) return denied;
    if (!baseEnv.ADMIN_TOKEN || !await adminAuthorized(request, baseEnv)) return json({ error: "Administrator authorization required" }, 401);
    if (request.method === "GET") {
      const limit = Number(url.searchParams.get("limit") ?? 20);
      return json({ enabled: catalogSyncEnabled(baseEnv.XYOPS_CATALOG_SYNC_ENABLED), persistenceAvailable: Boolean(baseEnv.DB), runs: await listCatalogSyncRuns(baseEnv, Number.isFinite(limit) ? limit : 20) });
    }
    if (request.method === "POST") {
      if (!baseEnv.DB) return json({ error: "Persistent database is unavailable" }, 503);
      const result = await runCatalogSynchronization(baseEnv, `manual:${requestActor(request)}`);
      return json({ run: result }, result.status === "failed" ? 502 : 200);
    }
    return json({ error: "Method not allowed" }, 405);
  }

'''
          replace_once(
              '  if (request.method === "GET" && url.pathname === "/api/integrations/catalog") {\n',
              api_block + '  if (request.method === "GET" && url.pathname === "/api/integrations/catalog") {\n',
          )

          worker_path.write_text(text)

          secure_path = Path("worker/secure-entry.ts")
          secure = secure_path.read_text()
          old = '''const worker = {\n  async fetch(request: Request, env: SecureEnv | undefined, ctx: RuntimeContext): Promise<Response> {\n    const sourceEnv = env ?? (process.env as unknown as SecureEnv);\n    const secured = await secureContext(request, sourceEnv);\n    return runtime.fetch(secured.request, secured.env, ctx);\n  },\n};\n'''
          new = '''type ScheduledController = { cron?: string; scheduledTime?: number };\ntype RuntimeWithScheduled = typeof runtime & { scheduled?: (controller: ScheduledController, env: SecureEnv, ctx: RuntimeContext) => Promise<void> | void };\n\nconst worker = {\n  async fetch(request: Request, env: SecureEnv | undefined, ctx: RuntimeContext): Promise<Response> {\n    const sourceEnv = env ?? (process.env as unknown as SecureEnv);\n    const secured = await secureContext(request, sourceEnv);\n    return runtime.fetch(secured.request, secured.env, ctx);\n  },\n\n  async scheduled(controller: ScheduledController, env: SecureEnv | undefined, ctx: RuntimeContext): Promise<void> {\n    const sourceEnv = env ?? (process.env as unknown as SecureEnv);\n    const scheduledRuntime = runtime as RuntimeWithScheduled;\n    if (scheduledRuntime.scheduled) await scheduledRuntime.scheduled(controller, sourceEnv, ctx);\n  },\n};\n'''
          if old not in secure:
              raise SystemExit("secure entry anchor not found")
          secure_path.write_text(secure.replace(old, new, 1))

          vite_path = Path("vite.config.ts")
          vite = vite_path.read_text()
          old = '  compatibility_flags: ["nodejs_compat"],\n'
          new = '  compatibility_flags: ["nodejs_compat"],\n  triggers: { crons: ["0 * * * *"] },\n'
          if old not in vite:
              raise SystemExit("vite anchor not found")
          vite_path.write_text(vite.replace(old, new, 1))

          roadmap_path = Path("docs/PRODUCT_ROADMAP.md")
          roadmap = roadmap_path.read_text()
          roadmap = roadmap.replace('- [ ] Добавление плановой синхронизации каталога.', '- [x] Добавление плановой синхронизации каталога с D1-lock и журналом запусков.')
          roadmap_path.write_text(roadmap)

          env_path = Path(".env.example")
          env_text = env_path.read_text()
          env_anchor = 'XYOPS_EVENT_ID=freeipa-user-create\n'
          env_insert = 'XYOPS_EVENT_ID=freeipa-user-create\n\n# Cloudflare Cron Trigger invokes worker.scheduled() hourly. Set false to disable.\nXYOPS_CATALOG_SYNC_ENABLED=true\nXYOPS_CATALOG_SYNC_LOCK_TTL_SECONDS=900\n'
          if env_anchor not in env_text:
              raise SystemExit("env anchor not found")
          env_path.write_text(env_text.replace(env_anchor, env_insert, 1))

          dev_path = Path(".dev.vars.example")
          dev_text = dev_path.read_text()
          if 'XYOPS_CATALOG_SYNC_ENABLED=' not in dev_text:
              dev_text += '\n# Scheduled XYOps catalog synchronization\nXYOPS_CATALOG_SYNC_ENABLED=true\nXYOPS_CATALOG_SYNC_LOCK_TTL_SECONDS=900\n'
          dev_path.write_text(dev_text)

          Path("docs/CATALOG_SYNC.md").write_text('''# Scheduled XYOps catalog synchronization\n\nThe Worker registers an hourly Cloudflare Cron Trigger (`0 * * * *`) and implements `scheduled()`. Each invocation loads the effective encrypted XYOps settings, fetches `get_events/v1`, normalizes and sorts the catalog, persists the current snapshot, and records schema changes.\n\n## Concurrency safety\n\nA D1 lock prevents overlapping synchronizations. Locks older than `XYOPS_CATALOG_SYNC_LOCK_TTL_SECONDS` are treated as abandoned and removed. The default is 900 seconds and accepted values are clamped between 60 and 3600 seconds.\n\n## Configuration\n\n```env\nXYOPS_CATALOG_SYNC_ENABLED=true\nXYOPS_CATALOG_SYNC_LOCK_TTL_SECONDS=900\n```\n\nSet `XYOPS_CATALOG_SYNC_ENABLED=false` to disable cron execution without removing the trigger. Demo mode and an unconfigured XYOps connection produce a visible `skipped` result instead of mutating the catalog.\n\n## API\n\nAdministrators can inspect and manually run synchronization with the same `ADMIN_TOKEN` used by persistent settings:\n\n- `GET /api/integrations/catalog/sync?limit=20` — recent scheduled/manual runs.\n- `POST /api/integrations/catalog/sync` — run immediately.\n\nEvery run records its trigger, state, timestamps, process count, change count, and a sanitized error message. Only the latest 50 records are retained.\n''')

          Path("tests/catalog-scheduled-sync.test.mjs").write_text(r'''import assert from "node:assert/strict";
import test from "node:test";

import worker from "../dist/server/index.js";

class SyncD1 {
  snapshot = null;
  history = [];
  locks = new Map();
  syncRuns = new Map();

  prepare(sql) {
    let values = [];
    const statement = {
      bind: (...args) => { values = args; return statement; },
      run: async () => {
        if (sql.startsWith("DELETE FROM xyops_catalog_sync_lock WHERE id = ? AND acquired_at < ?")) {
          const current = this.locks.get(values[0]);
          if (current !== undefined && current < values[1]) this.locks.delete(values[0]);
          return { meta: { changes: 0 } };
        }
        if (sql.startsWith("INSERT OR IGNORE INTO xyops_catalog_sync_lock")) {
          if (this.locks.has(values[0])) return { meta: { changes: 0 } };
          this.locks.set(values[0], values[1]);
          return { meta: { changes: 1 } };
        }
        if (sql.startsWith("DELETE FROM xyops_catalog_sync_lock WHERE id = ? AND acquired_at = ?")) {
          if (this.locks.get(values[0]) === values[1]) this.locks.delete(values[0]);
          return { meta: { changes: 1 } };
        }
        if (sql.startsWith("INSERT INTO xyops_catalog_sync_runs")) {
          this.syncRuns.set(values[0], { id: values[0], trigger_name: values[1], status: values[2], started_at: values[3], completed_at: values[4], process_count: values[5], change_count: values[6], error: values[7] });
          return { meta: { changes: 1 } };
        }
        if (sql.startsWith("INSERT INTO xyops_catalog_snapshot")) {
          this.snapshot = { catalog_json: values[1], synced_at: values[2] };
          return { meta: { changes: 1 } };
        }
        if (sql.startsWith("INSERT INTO xyops_catalog_history")) {
          this.history.push({ id: values[0], synced_at: values[1], changes_json: values[2], catalog_json: values[3] });
          return { meta: { changes: 1 } };
        }
        return { meta: { changes: 0 } };
      },
      first: async () => {
        if (sql.startsWith("SELECT config_json")) return null;
        if (sql.startsWith("SELECT catalog_json")) return this.snapshot;
        if (sql.startsWith("SELECT acquired_at")) return this.locks.has(values[0]) ? { acquired_at: this.locks.get(values[0]) } : null;
        return null;
      },
      all: async () => {
        if (sql.startsWith("SELECT id, trigger_name")) return { results: [...this.syncRuns.values()].sort((a, b) => b.started_at - a.started_at).slice(0, Number(values[0] ?? 20)) };
        if (sql.startsWith("SELECT id, synced_at")) return { results: [...this.history] };
        return { results: [] };
      },
    };
    return statement;
  }
}

function adminEnv(db, values = {}) {
  return {
    DB: db,
    XYOPS_URL: "https://xyops.example.test",
    XYOPS_API_KEY: "secret",
    ADMIN_TOKEN: "admin-token",
    PORTAL_IDENTITY_MODE: "static",
    PORTAL_STATIC_IDENTITY: "admin@example.test",
    PORTAL_DEFAULT_ROLE: "viewer",
    PORTAL_RBAC_JSON: JSON.stringify({ "admin@example.test": "admin" }),
    ...values,
  };
}

test("scheduled handler synchronizes the XYOps catalog and records a successful run", async () => {
  const originalFetch = globalThis.fetch;
  const db = new SyncD1();
  let calls = 0;
  globalThis.fetch = async (input) => {
    const url = new URL(typeof input === "string" ? input : input.url);
    if (url.pathname.endsWith("/get_events/v1")) {
      calls += 1;
      return Response.json({ events: [{ id: "backup", title: "Backup", type: "workflow", category: "Databases" }] });
    }
    return new Response("not found", { status: 404 });
  };
  try {
    let background;
    await worker.scheduled({ cron: "0 * * * *", scheduledTime: Date.now() }, adminEnv(db), { waitUntil(promise) { background = promise; }, passThroughOnException() {} });
    await background;
    assert.equal(calls, 1);
    assert.deepEqual(JSON.parse(db.snapshot.catalog_json).map((event) => event.id), ["backup"]);
    assert.equal(db.history.length, 1);

    const response = await worker.fetch(new Request("https://dashboard.test/api/integrations/catalog/sync", { headers: { "x-admin-token": "admin-token" } }), adminEnv(db), {});
    assert.equal(response.status, 200);
    const payload = await response.json();
    assert.equal(payload.runs[0].status, "success");
    assert.equal(payload.runs[0].trigger, "cron:0 * * * *");
    assert.equal(payload.runs[0].processCount, 1);
    assert.equal(payload.runs[0].changeCount, 1);
  } finally {
    globalThis.fetch = originalFetch;
  }
});

test("D1 lock skips an overlapping scheduled synchronization", async () => {
  const originalFetch = globalThis.fetch;
  const db = new SyncD1();
  db.locks.set("catalog", Date.now());
  globalThis.fetch = async () => { throw new Error("network must not be called"); };
  try {
    let background;
    await worker.scheduled({ cron: "0 * * * *" }, adminEnv(db), { waitUntil(promise) { background = promise; }, passThroughOnException() {} });
    await background;
    const runs = [...db.syncRuns.values()];
    assert.equal(runs.length, 1);
    assert.equal(runs[0].status, "skipped");
    assert.match(runs[0].error, /уже выполняется/);
  } finally {
    globalThis.fetch = originalFetch;
  }
});

test("automatic synchronization can be disabled without removing the cron trigger", async () => {
  const db = new SyncD1();
  let scheduled = false;
  await worker.scheduled({ cron: "0 * * * *" }, adminEnv(db, { XYOPS_CATALOG_SYNC_ENABLED: "false" }), { waitUntil() { scheduled = true; }, passThroughOnException() {} });
  assert.equal(scheduled, false);
  assert.equal(db.syncRuns.size, 0);
});
''')
          PY

