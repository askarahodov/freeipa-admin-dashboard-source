name: Local auth RBAC integration

on:
  push:
    branches:
      - agent/local-auth-rbac-ui

permissions:
  contents: write

jobs:
  integrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/local-auth-rbac-ui
          fetch-depth: 0
      - name: Apply integration patch
        run: node scripts/apply-local-auth-rbac.mjs
      - name: Commit integrated files
        run: |
          if git diff --quiet; then
            echo "No integration changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worker/index.ts worker/secure-entry.ts app/page.tsx app/globals.css .env.example README.md docs/PRODUCT_ROADMAP.md
          git commit -m "Integrate local authentication and RBAC UI"
          git push origin HEAD:agent/local-auth-rbac-ui
