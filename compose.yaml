services:
  dashboard:
    build:
      context: .
    image: freeipa-admin-dashboard:local
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      # Public development-only key. Replace it before any non-local deployment.
      CONFIG_ENCRYPTION_KEY: d0ee92e4c9b6b9e1282d4808ff08e03de28087b1b0b3b5f44198f7bdbe782ec5
    volumes:
      - dashboard-data:/app/.wrangler
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  dashboard-data:
